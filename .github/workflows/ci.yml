name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FAL_KEY: ""
      CLAY_SCREEN_ACCESS_CODE: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-local.txt
            requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: pip install -r requirements-dev.txt
      - run: pytest -q
      - run: npm run check
      - run: npm test
