    <rect x="20" y="400" width="1216" height="60" rx="18" fill="#e7d8c6"/>
    <rect x="35" y="414" width="215" height="32" rx="11" fill="#171714"/>
    <circle cx="290" cy="430" r="16" fill="#ef8558"/>
    <circle cx="332" cy="430" r="16" fill="#d6bd94"/>
    <circle cx="374" cy="430" r="16" fill="#2e3e47"/>
